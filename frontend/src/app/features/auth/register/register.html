<div class="mx-auto flex min-h-[70vh] max-w-5xl items-center justify-center px-4 py-10">
    <div class="w-full max-w-md rounded-2xl border border-slate-200 bg-white p-8 shadow-xl">
        <div class="mb-6 text-center">
            <h2 class="text-2xl font-bold text-slate-800">Create your account</h2>
            <p class="mt-2 text-sm text-slate-500">Join JobPortal and start exploring opportunities</p>
        </div>

        <form class="space-y-4" (ngSubmit)="onSubmit()" #registerForm="ngForm">
            <mat-form-field appearance="outline" class="w-full">
                <mat-label>Full name</mat-label>
                <input matInput type="text" [(ngModel)]="fullname" name="fullname" required />
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-full">
                <mat-label>Email</mat-label>
                <input matInput type="email" [(ngModel)]="email" name="email" required />
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-full">
                <mat-label>Phone number</mat-label>
                <input matInput type="number" [(ngModel)]="phoneNumber" name="phoneNumber" required />
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-full">
                <mat-label>Password</mat-label>
                <input matInput type="password" [(ngModel)]="password" name="password" required />
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-full">
                <mat-label>Role</mat-label>
                <mat-select [(ngModel)]="role" name="role">
                    <mat-option value="worker">Worker</mat-option>
                    <mat-option value="recruiter">Recruiter</mat-option>
                </mat-select>
            </mat-form-field>

            <button mat-flat-button color="primary" type="submit" class="w-full">
                Register
            </button>
        </form>

        <p class="mt-4 text-center text-sm text-slate-500">
            Already have an account?
            <a routerLink="/login" class="font-medium text-teal-600">Login</a>
        </p>
    </div>
</div>
